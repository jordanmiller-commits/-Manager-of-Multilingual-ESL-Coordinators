<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coordinator Workload Dashboard</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2c3e6e"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f7;min-height:100vh;padding:20px;color:#333;transition:background .3s,color .3s}
.wrap{max-width:1200px;margin:0 auto}
.header{background:linear-gradient(135deg,#2c3e6e,#4a90d9);color:#fff;padding:24px 28px 16px;border-radius:14px;margin-bottom:16px}
.header h1{font-size:21px;font-weight:800;margin-bottom:2px}
.header p{font-size:12px;opacity:.85;margin-bottom:12px}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tool-btn{background:rgba(255,255,255,.13);color:#fff;border:2px solid rgba(255,255,255,.35);padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tool-btn:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.55)}
.save-indicator{font-size:10px;color:rgba(255,255,255,.6);margin-left:auto}
.nav-links{display:flex;gap:6px;margin-top:8px}
.nav-link{color:rgba(255,255,255,.7);font-size:11px;text-decoration:none;padding:3px 10px;border:1px solid rgba(255,255,255,.25);border-radius:5px;transition:all .15s}
.nav-link:hover{color:#fff;border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.1)}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.month-nav button{padding:6px 14px;border-radius:6px;border:1.5px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#555;transition:all .15s}
.month-nav button:hover{background:#eaf3fb;border-color:#4a90d9;color:#2c3e6e}
.month-label{font-size:18px;font-weight:700;color:#2c3e6e;min-width:200px;text-align:center}
.coord-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.coord-card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);padding:18px;border-top:4px solid #4a90d9}
.coord-card:nth-child(2){border-top-color:#27ae60}
.coord-card:nth-child(3){border-top-color:#8e44ad}
.coord-card:nth-child(4){border-top-color:#f39c12}
.coord-name{font-size:16px;font-weight:800;color:#2c3e6e;margin-bottom:4px}
.coord-campuses{font-size:11px;color:#888;margin-bottom:10px}
.workload-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid #f0f0f0}
.workload-row:last-child{border-bottom:none}
.workload-label{color:#555}
.workload-value{font-weight:700;color:#2c3e6e}
.capacity-meter{margin-top:10px}
.capacity-bar-track{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.capacity-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.capacity-bar-fill.green{background:#27ae60}
.capacity-bar-fill.yellow{background:#f1c40f}
.capacity-bar-fill.red{background:#e74c3c}
.capacity-label{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.capacity-label.green{color:#27ae60}
.capacity-label.yellow{color:#f39c12}
.capacity-label.red{color:#e74c3c}
.overdue-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef0ef;color:#e74c3c;border:1px solid #f5b7b1;margin-top:6px}
.assess-scores{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
.assess-chip{padding:2px 6px;border-radius:8px;font-size:9px;font-weight:600;background:#f5eefb;color:#8e44ad;border:1px solid #e8d5f5}
.summary-card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);padding:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center;margin-bottom:12px}
.summary-stat{padding:8px}
.summary-value{font-size:24px;font-weight:800;color:#2c3e6e}
.summary-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-top:2px}
.coverage-gaps{margin-top:12px;padding:12px;border-radius:8px;border:1.5px solid #f39c12;background:#fff8e6;font-size:12px;color:#856404}
.coverage-ok{padding:12px;border-radius:8px;background:#eafaf1;border:1.5px solid #a9dfbf;font-size:12px;color:#1b5e20;margin-top:12px}

body.dark-mode{background:#1a1a2e;color:#e0e0e0}
body.dark-mode .header{background:linear-gradient(135deg,#1a1a2e,#2d3a6e)}
body.dark-mode .coord-card,body.dark-mode .summary-card{background:#16213e;box-shadow:0 1px 5px rgba(0,0,0,.3)}
body.dark-mode .coord-name{color:#7eb8f7}
body.dark-mode .workload-label{color:#bbb}
body.dark-mode .workload-value{color:#7eb8f7}
body.dark-mode .workload-row{border-bottom-color:#2d3a6e}
body.dark-mode .month-label{color:#7eb8f7}
body.dark-mode .month-nav button{background:#16213e;color:#e0e0e0;border-color:#2d3a6e}
body.dark-mode .month-nav button:hover{background:#2d3a6e}
body.dark-mode .capacity-bar-track{background:#2d3a6e}
body.dark-mode .summary-value{color:#7eb8f7}
body.dark-mode .summary-label{color:#aaa}
body.dark-mode .coverage-gaps{background:#2d2a1a;border-color:#664d03;color:#f0c27a}
body.dark-mode .coverage-ok{background:#1a2e1a;border-color:#2a5a2a;color:#66bb6a}
body.dark-mode .overdue-badge{background:#3a1a1a;border-color:#5a2a2a;color:#f5b7b1}
body.dark-mode .assess-chip{background:#2a1a3e;color:#b39ddb;border-color:#5a3a7e}

@media(max-width:768px){
  .coord-grid{grid-template-columns:1fr}
  .summary-card{grid-template-columns:1fr}
}
@media(max-width:600px){
  body{padding:8px}
  .header{padding:16px 14px}
  .header h1{font-size:17px}
  .toolbar{gap:4px}
  .tool-btn{padding:5px 9px;font-size:10px}
}
@media print{
  body{background:#fff!important;padding:0;color:#333!important}
  .header .toolbar,.header .nav-links,.month-nav button{display:none!important}
  .coord-card,.summary-card{box-shadow:none!important;border:1px solid #ddd}
  .capacity-bar-fill,.coord-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.dark-mode,body.dark-mode .coord-card,body.dark-mode .summary-card{background:#fff!important;color:#333!important}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Coordinator Workload Dashboard</h1>
    <p>Monitor team capacity, workload balance, and campus coverage</p>
    <div class="toolbar">
      <button class="tool-btn" onclick="toggleDarkMode()" id="darkModeToggle">Dark</button>
      <span class="save-indicator">Data: read-only from shared storage</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="index.html">&#127968; Home</a>
      <a class="nav-link" href="Academic_Monitoring_Leader_Facing/Coaching_Cycle_Tracker.html">Coaching Tracker</a>
      <a class="nav-link" href="ESL_Programming_Plans/ESL_Coordinator_Scope_Sequence.html">Scope &amp; Sequence</a>
    </div>
  </div>

  <div class="month-nav">
    <button onclick="navigateMonth(-1)">&larr; Previous</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="navigateMonth(1)">Next &rarr;</button>
  </div>

  <div class="coord-grid" id="coordGrid"></div>

  <div class="summary-card" id="summaryCard"></div>

  <div id="coverageGaps"></div>
</div>

<script>
var currentMonth = new Date().getMonth();
var currentYear = new Date().getFullYear();

function toggleDarkMode() {
  var d = document.body.classList.toggle("dark-mode");
  localStorage.setItem("esl_app_theme", d ? "dark" : "light");
  var b = document.getElementById("darkModeToggle");
  if (b) b.textContent = d ? "Light" : "Dark";
}

(function(){
  if (localStorage.getItem("esl_app_theme") === "dark") {
    document.body.classList.add("dark-mode");
    var b = document.getElementById("darkModeToggle");
    if (b) b.textContent = "Light";
  }
})();

function navigateMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderAll();
}

function getMonthLabel() {
  var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return months[currentMonth] + " " + currentYear;
}

function isInMonth(dateStr, month, year) {
  if (!dateStr) return false;
  try {
    var d = new Date(dateStr);
    return d.getMonth() === month && d.getFullYear() === year;
  } catch(e) { return false; }
}

function safeGet(key) {
  try {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getCoordinatorData() {
  var scopeData = safeGet("esl_scope_data");
  var coordNames = ["Coordinator 1", "Coordinator 2", "Coordinator 3", "Coordinator 4"];
  var coordCampuses = [[], [], [], []];

  if (scopeData) {
    if (scopeData.coordNames) {
      for (var i = 0; i < 4; i++) {
        if (scopeData.coordNames[i]) coordNames[i] = scopeData.coordNames[i];
      }
    }
    if (scopeData.coordCampuses) {
      for (var j = 0; j < 4; j++) {
        if (scopeData.coordCampuses[j]) coordCampuses[j] = scopeData.coordCampuses[j];
      }
    }
  }

  return {names: coordNames, campuses: coordCampuses, scopeData: scopeData};
}

function campusMatch(campusList, campusName) {
  if (!campusList || campusList.length === 0) return false;
  var cn = (campusName || "").toLowerCase();
  for (var i = 0; i < campusList.length; i++) {
    if (campusList[i].toLowerCase() === cn) return true;
  }
  return false;
}

function getCoordWorkload(coordCampuses, month, year) {
  var result = {activeCycles: 0, walkthroughs: 0, audits: 0, overdue: 0, totalActive: 0};

  // Coaching cycles
  var cd = safeGet("coaching_cycles_data");
  var cycs = cd && cd.cycles ? cd.cycles : [];
  for (var i = 0; i < cycs.length; i++) {
    var c = cycs[i];
    if (coordCampuses.length > 0 && !campusMatch(coordCampuses, c.campus)) continue;
    var isComplete = true;
    for (var s = 0; s < (c.stages || []).length; s++) {
      if (c.stages[s].status !== "complete") { isComplete = false; break; }
    }
    if (!isComplete) {
      result.activeCycles++;
      for (var s2 = 0; s2 < (c.stages || []).length; s2++) {
        if (c.stages[s2].date && c.stages[s2].status !== "complete") {
          var stageDate = new Date(c.stages[s2].date);
          if (stageDate < new Date()) result.overdue++;
        }
      }
    }
  }

  // Walkthroughs
  var wh = safeGet("walkthrough_history") || [];
  for (var wi = 0; wi < wh.length; wi++) {
    var wCampus = (wh[wi].meta && wh[wi].meta.campus) || "";
    if (coordCampuses.length > 0 && !campusMatch(coordCampuses, wCampus)) continue;
    var wDate = (wh[wi].meta && wh[wi].meta.date) || "";
    if (isInMonth(wDate, month, year)) result.walkthroughs++;
  }

  // Audits
  var ah = safeGet("esl_audit_history") || [];
  for (var ai = 0; ai < ah.length; ai++) {
    var aCampus = (ah[ai].meta && ah[ai].meta.campus) || "";
    if (coordCampuses.length > 0 && !campusMatch(coordCampuses, aCampus)) continue;
    var aDate = (ah[ai].meta && ah[ai].meta.date) || "";
    if (isInMonth(aDate, month, year)) result.audits++;
  }

  result.totalActive = result.activeCycles + result.walkthroughs + result.audits;
  return result;
}

function getLatestAssessment(coordId) {
  var data = safeGet("coordinator_self_assessments");
  if (!data || !data.assessments) return null;
  var latest = null;
  for (var i = 0; i < data.assessments.length; i++) {
    if (data.assessments[i].coordId === coordId) {
      if (!latest || (data.assessments[i].date || "") > (latest.date || "")) {
        latest = data.assessments[i];
      }
    }
  }
  return latest;
}

function escHtml(str) {
  if (!str) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function renderCoordCard(name, campuses, workload, coordIdx) {
  var colors = ["#4a90d9", "#27ae60", "#8e44ad", "#f39c12"];
  var capClass = "green";
  var capLabel = "On Track";
  var capPct = Math.min(100, Math.round((workload.totalActive / 12) * 100));
  if (workload.totalActive > 8) { capClass = "red"; capLabel = "Over Capacity"; }
  else if (workload.totalActive > 5) { capClass = "yellow"; capLabel = "Near Capacity"; }

  var html = "<div class='coord-card' style='border-top-color:" + colors[coordIdx % 4] + "'>";
  html += "<div class='coord-name'>" + escHtml(name) + "</div>";
  html += "<div class='coord-campuses'>" + (campuses.length > 0 ? escHtml(campuses.join(", ")) : "No campuses assigned") + "</div>";

  html += "<div class='workload-row'><span class='workload-label'>Active Coaching Cycles</span><span class='workload-value'>" + workload.activeCycles + "</span></div>";
  html += "<div class='workload-row'><span class='workload-label'>Walkthroughs This Month</span><span class='workload-value'>" + workload.walkthroughs + "</span></div>";
  html += "<div class='workload-row'><span class='workload-label'>Audits This Month</span><span class='workload-value'>" + workload.audits + "</span></div>";

  html += "<div class='capacity-meter'>";
  html += "<div class='capacity-label " + capClass + "'>" + capLabel + " (" + workload.totalActive + " active items)</div>";
  html += "<div class='capacity-bar-track'><div class='capacity-bar-fill " + capClass + "' style='width:" + capPct + "%'></div></div>";
  html += "</div>";

  if (workload.overdue > 0) {
    html += "<div class='overdue-badge'>" + workload.overdue + " overdue item" + (workload.overdue !== 1 ? "s" : "") + "</div>";
  }

  var assess = getLatestAssessment(coordIdx);
  if (assess && assess.ratings) {
    html += "<div class='assess-scores'>";
    var rKeys = ["coaching", "pd", "dataUse", "relationships"];
    var rLabels = ["Coach", "PD", "Data", "Rel"];
    for (var ri = 0; ri < rKeys.length; ri++) {
      if (assess.ratings[rKeys[ri]]) {
        html += "<span class='assess-chip'>" + rLabels[ri] + ": " + assess.ratings[rKeys[ri]] + "/4</span>";
      }
    }
    html += "</div>";
  }

  html += "</div>";
  return html;
}

function renderAll() {
  document.getElementById("monthLabel").textContent = getMonthLabel();

  var coordData = getCoordinatorData();
  var allWorkloads = [];
  var coordHtml = "";

  for (var i = 0; i < 4; i++) {
    var workload = getCoordWorkload(coordData.campuses[i], currentMonth, currentYear);
    allWorkloads.push(workload);
    coordHtml += renderCoordCard(coordData.names[i], coordData.campuses[i], workload, i);
  }

  document.getElementById("coordGrid").innerHTML = coordHtml;

  // Summary
  var totalCycles = 0, totalWalkthroughs = 0, totalAudits = 0;
  for (var j = 0; j < allWorkloads.length; j++) {
    totalCycles += allWorkloads[j].activeCycles;
    totalWalkthroughs += allWorkloads[j].walkthroughs;
    totalAudits += allWorkloads[j].audits;
  }

  var summaryHtml = "";
  summaryHtml += "<div class='summary-stat'><div class='summary-value'>" + totalCycles + "</div><div class='summary-label'>Active Coaching Cycles</div></div>";
  summaryHtml += "<div class='summary-stat'><div class='summary-value'>" + totalWalkthroughs + "</div><div class='summary-label'>Walkthroughs This Month</div></div>";
  summaryHtml += "<div class='summary-stat'><div class='summary-value'>" + totalAudits + "</div><div class='summary-label'>Audits This Month</div></div>";
  document.getElementById("summaryCard").innerHTML = summaryHtml;

  // Coverage gaps
  var allCampuses = {};
  for (var ci = 0; ci < coordData.campuses.length; ci++) {
    for (var cj = 0; cj < coordData.campuses[ci].length; cj++) {
      allCampuses[coordData.campuses[ci][cj]] = false;
    }
  }

  var wh2 = safeGet("walkthrough_history") || [];
  for (var wi2 = 0; wi2 < wh2.length; wi2++) {
    var wc2 = (wh2[wi2].meta && wh2[wi2].meta.campus) || "";
    var wd2 = (wh2[wi2].meta && wh2[wi2].meta.date) || "";
    if (isInMonth(wd2, currentMonth, currentYear) && allCampuses.hasOwnProperty(wc2)) {
      allCampuses[wc2] = true;
    }
  }

  var ah2 = safeGet("esl_audit_history") || [];
  for (var ai2 = 0; ai2 < ah2.length; ai2++) {
    var ac2 = (ah2[ai2].meta && ah2[ai2].meta.campus) || "";
    var ad2 = (ah2[ai2].meta && ah2[ai2].meta.date) || "";
    if (isInMonth(ad2, currentMonth, currentYear) && allCampuses.hasOwnProperty(ac2)) {
      allCampuses[ac2] = true;
    }
  }

  var gaps = [];
  var campusCount = 0;
  for (var gk in allCampuses) {
    if (allCampuses.hasOwnProperty(gk)) {
      campusCount++;
      if (!allCampuses[gk]) gaps.push(gk);
    }
  }

  var gapEl = document.getElementById("coverageGaps");
  if (gaps.length > 0) {
    gapEl.innerHTML = "<div class='coverage-gaps'><strong>Campus Coverage Gaps:</strong> " + escHtml(gaps.join(", ")) + " &mdash; no walkthroughs or audits this month</div>";
  } else if (campusCount > 0) {
    gapEl.innerHTML = "<div class='coverage-ok'><strong>Full Coverage:</strong> All assigned campuses have activity this month.</div>";
  } else {
    gapEl.innerHTML = "";
  }
}

renderAll();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(function() {});
}
</script>
</body>
</html>
