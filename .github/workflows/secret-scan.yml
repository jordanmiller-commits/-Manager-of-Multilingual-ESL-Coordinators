name: "Secret & Sensitive Data Scan"

# To suppress a false positive, add '# nosec' at end of the line

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for sensitive data patterns
        run: |
          set +e
          FOUND=0

          echo "=== Scanning for sensitive data patterns ==="
          echo ""

          # -------------------------------------------------------
          # 1. Google Apps Script deployment URLs
          #    Pattern: script.google.com/macros/s/<ID>/exec or /dev
          #    These should never be committed to source — coordinators
          #    enter the URL at runtime in the Data Backup Hub UI.
          # -------------------------------------------------------
          echo "--- Checking for Google Apps Script deployment URLs ---"
          GAS_MATCHES=$(grep -rn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="CHANGELOG.md" \
            'script\.google\.com/macros/s/[A-Za-z0-9_-]\{10,\}' \
            . 2>/dev/null | grep -v '# nosec')
          if [ -n "$GAS_MATCHES" ]; then
            echo "MATCH FOUND — Google Apps Script URL(s):"
            echo "$GAS_MATCHES"
            echo ""
            FOUND=1
          else
            echo "OK — no GAS deployment URLs found."
          fi
          echo ""

          # -------------------------------------------------------
          # 2. GitHub Personal Access Tokens
          #    Pattern: classic PAT (ghp_...) or fine-grained PAT prefix
          #    These are written by users into localStorage at runtime
          #    and must never appear in committed source files.
          # -------------------------------------------------------
          echo "--- Checking for GitHub Personal Access Tokens ---"
          PAT_MATCHES=$(grep -rn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="CHANGELOG.md" \
            -e 'ghp_[A-Za-z0-9]\{36\}' \
            -e 'github_pat_' \
            . 2>/dev/null | grep -v '# nosec')
          if [ -n "$PAT_MATCHES" ]; then
            echo "MATCH FOUND — GitHub PAT(s):"
            echo "$PAT_MATCHES"
            echo ""
            FOUND=1
          else
            echo "OK — no GitHub PATs found."
          fi
          echo ""

          # -------------------------------------------------------
          # 3. Google Drive folder IDs in JS files outside Code.gs
          #    The FOLDER_ID constant in Code.gs is expected and allowed.
          #    Any Drive folder ID that appears in other JS/HTML files
          #    (e.g. hardcoded into frontend code) is flagged.
          #    Pattern: 33-character alphanumeric Drive resource IDs
          #    that are NOT inside google_apps_script/Code.gs
          # -------------------------------------------------------
          echo "--- Checking for Google Drive folder IDs outside Code.gs ---"
          DRIVE_MATCHES=$(grep -rn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="CHANGELOG.md" \
            --include="*.js" \
            --include="*.html" \
            --include="*.gs" \
            '[A-Za-z0-9_-]\{25,45\}' \
            . 2>/dev/null \
            | grep -v 'google_apps_script/Code\.gs' \
            | grep -v '# nosec' \
            | grep -E '[A-Za-z0-9_-]{33}')
          if [ -n "$DRIVE_MATCHES" ]; then
            echo "MATCH FOUND — Possible Drive folder/file ID(s) outside Code.gs:"
            echo "$DRIVE_MATCHES"
            echo ""
            FOUND=1
          else
            echo "OK — no Drive IDs found outside Code.gs."
          fi
          echo ""

          # -------------------------------------------------------
          # Final result
          # -------------------------------------------------------
          if [ "$FOUND" -eq 1 ]; then
            echo "=============================================="
            echo "FOUND SENSITIVE DATA — see above"
            echo "=============================================="
            echo ""
            echo "If a match is a false positive, add '# nosec' to the end of that line."
            exit 1
          else
            echo "No sensitive data patterns found."
          fi
