<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goal-Setting &amp; Growth Planning</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#2c3e6e"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.github.com; font-src 'self'; frame-src 'none'"/>
<style>
:root{
  --bg:#f0f2f7;--card-bg:#fff;--card-border:transparent;--card-shadow:rgba(0,0,0,.07);
  --text:#333;--text-secondary:#555;--text-muted:#888;--text-faint:#aaa;--text-heading:#2c3e6e;
  --input-bg:#fff;--input-border:#ddd;--input-text:#333;
  --border:#eee;--border-light:#f5f5f5;--hover-bg:#f0f4fb;--item-hover:#f8f9fb;
  --section-bg-light:#f8f9fb;
  --primary:#4a90d9;--primary-dark:#2c3e6e;--primary-light:#7eb8f7;
  --success:#27ae60;--success-light:#e8f5e9;--success-text:#2e7d32;
  --danger:#e74c3c;--danger-light:#fdecea;--danger-text:#c0392b;
  --warn:#f39c12;--warn-bg:#fff3e0;--warn-text:#e65100;--warn-border:#ffe0b2;
  --info-bg:#e3f2fd;--info-text:#1565c0;--info-border:#bbdefb;
  --good-bg:#e8f5e9;--good-text:#2e7d32;--good-border:#c8e6c9;
  --header-gradient-1:#2c3e6e;--header-gradient-2:#4a90d9;
  --shadow:0 1px 5px rgba(0,0,0,.07);
  --modal-bg:#fff;--modal-overlay:rgba(0,0,0,.45);
  --toast-bg:#2c3e6e;--toast-text:#fff;
  --footer-bg:rgba(248,249,251,.95);--footer-border:#e0e3e8;--footer-text:#999
}
body.dark-mode{
  --bg:#1a1a2e;--card-bg:#16213e;--card-border:#2d3a6e;--card-shadow:rgba(0,0,0,.3);
  --text:#e0e0e0;--text-secondary:#ccc;--text-muted:#999;--text-faint:#666;--text-heading:#7eb8f7;
  --input-bg:#16213e;--input-border:#2d3a6e;--input-text:#e0e0e0;
  --border:#2d3a6e;--border-light:#2d3a6e;--hover-bg:#1a2744;--item-hover:#1a2744;
  --section-bg-light:#1a2744;
  --primary:#4a90d9;--primary-dark:#2d3a6e;--primary-light:#7eb8f7;
  --success:#27ae60;--success-light:#1a3a1a;--success-text:#66bb6a;
  --danger:#e74c3c;--danger-light:#3a1a1a;--danger-text:#ef5350;
  --warn:#f39c12;--warn-bg:#3e2a10;--warn-text:#f5c842;--warn-border:#5a3e15;
  --info-bg:#0d2847;--info-text:#64b5f6;--info-border:#1a3a5c;
  --good-bg:#1a3a1a;--good-text:#66bb6a;--good-border:#2a5a2a;
  --header-gradient-1:#1a1a2e;--header-gradient-2:#2d3a6e;
  --shadow:0 1px 5px rgba(0,0,0,.3);
  --modal-bg:#16213e;--modal-overlay:rgba(0,0,0,.7);
  --toast-bg:#7eb8f7;--toast-text:#1a1a2e;
  --footer-bg:rgba(30,30,30,.95);--footer-border:#333;--footer-text:#666
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);min-height:100vh;padding:20px;color:var(--text)}
.wrap{max-width:1100px;margin:0 auto}

/* HEADER */
.header{background:linear-gradient(135deg,var(--header-gradient-1),var(--header-gradient-2));color:#fff;padding:24px 28px 16px;border-radius:14px 14px 0 0}
.header h1{font-size:22px;font-weight:800;margin-bottom:2px}
.header p{font-size:12px;opacity:.85;margin-bottom:12px}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tool-btn{background:rgba(255,255,255,.13);color:#fff;border:2px solid rgba(255,255,255,.35);padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.tool-btn:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.55)}
.tool-btn.accent{border-color:rgba(46,204,113,.5);background:rgba(46,204,113,.15)}
.tool-btn.accent:hover{background:rgba(46,204,113,.3)}

/* ANIMATION */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
body{animation:fadeIn .25s ease both}

/* CARDS */
.card{background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px;transition:box-shadow .18s,transform .18s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.11);transform:translateY(-1px)}
.first-card{border-radius:0 0 10px 10px;margin-top:0;margin-bottom:14px}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.filter-bar select{padding:7px 10px;border:1.5px solid var(--input-border);border-radius:7px;font-size:12px;font-family:inherit;background:var(--input-bg);color:var(--input-text);cursor:pointer}
.filter-bar select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(74,144,217,.15)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);padding:16px 18px;text-align:center}
.stat-val{font-size:28px;font-weight:900;color:var(--text-heading);line-height:1.1}
.stat-val.green{color:var(--success)}
.stat-val.blue{color:var(--primary)}
.stat-val.orange{color:var(--warn)}
.stat-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* GOALS BOARD */
.goals-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.goal-card{background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s;border-top:4px solid var(--primary)}
.goal-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12)}
.goal-card-top{padding:14px 16px 10px}
.goal-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.coord-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;color:#fff}
.semester-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;background:var(--bg);color:var(--text-secondary)}
.goal-title{font-size:14px;font-weight:800;color:var(--text-heading);margin-bottom:4px;line-height:1.4}
.goal-metric{font-size:11px;color:var(--text-muted);margin-bottom:6px;line-height:1.4}
.goal-manager-target{font-size:11px;color:var(--text-secondary);background:var(--section-bg-light);padding:5px 8px;border-radius:5px;border-left:3px solid var(--primary);margin-bottom:8px;line-height:1.4}

/* ACTION STEPS */
.action-steps-header{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px}
.action-step-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:12px;color:var(--text-secondary)}
.action-step-row input[type="checkbox"]{margin-top:2px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.action-step-text{flex:1;line-height:1.4}
.action-step-text.done{text-decoration:line-through;color:var(--text-faint)}
.action-progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0 8px}
.action-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--primary),var(--success));transition:width .3s}
.action-progress-label{font-size:10px;color:var(--text-muted);margin-bottom:8px}

/* STATUS + CHECK-IN BADGES */
.badge-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.status-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700}
.badge-active{background:var(--info-bg);color:var(--info-text);border:1px solid var(--info-border)}
.badge-achieved{background:var(--good-bg);color:var(--good-text);border:1px solid var(--good-border)}
.badge-discontinued{background:var(--border-light);color:var(--text-muted);border:1px solid var(--input-border)}
.checkin-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid var(--input-border)}
.checkin-pill.done-mid{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border)}
.checkin-pill.done-end{background:var(--good-bg);color:var(--good-text);border-color:var(--good-border)}
.checkin-pill.pending{background:var(--border-light);color:var(--text-faint);border-color:var(--border)}

/* WALKTHROUGH CONNECT */
.walkthrough-connect{background:var(--section-bg-light);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:14px;flex-wrap:wrap}
.wc-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary)}
.wc-label{font-weight:600;color:var(--text-muted)}
.wc-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;background:var(--info-bg);color:var(--info-text);border:1px solid var(--info-border)}
.wc-badge.green{background:var(--good-bg);color:var(--good-text);border-color:var(--good-border)}
.wc-badge.gray{background:var(--border-light);color:var(--text-muted);border-color:var(--input-border)}

/* CARD ACTIONS */
.goal-card-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--border-light);flex-wrap:wrap}
.btn{padding:5px 11px;border-radius:6px;border:1.5px solid var(--input-border);background:var(--card-bg);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,transform .1s;color:var(--text-secondary)}
.btn:hover{background:var(--hover-bg);border-color:var(--primary);color:var(--text-heading)}
.btn:active{transform:scale(.97)}
.btn.primary,.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover,.btn-primary:hover{background:#3a7bc8}
.btn.success{background:var(--success);color:#fff;border-color:var(--success)}
.btn.success:hover{background:#219a52}
.btn.danger,.btn-danger{color:var(--danger);border-color:#f5c6cb}
.btn.danger:hover,.btn-danger:hover{background:var(--danger-light);border-color:var(--danger)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-lg{padding:10px 22px;font-size:13px;border-radius:8px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-faint)}
.empty-state .es-icon{font-size:46px;margin-bottom:12px}
.empty-state p{font-size:13px;margin-bottom:14px}
.empty-state .es-cta{margin-top:4px}

/* MODAL */
@keyframes modalFadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--modal-overlay);display:none;justify-content:center;align-items:flex-start;z-index:1000;padding:24px 14px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--modal-bg);border-radius:12px;padding:24px;max-width:580px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.2);margin:auto;color:var(--text);animation:modalFadeIn .2s ease both}
.modal h3{font-size:17px;font-weight:800;color:var(--text-heading);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px}
.form-field input,.form-field textarea,.form-field select{padding:8px 10px;border:1.5px solid var(--input-border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--input-bg);color:var(--input-text);transition:border-color .2s}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(74,144,217,.15)}
.form-field textarea{resize:vertical;min-height:68px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ACTION STEPS IN MODAL */
.steps-list{margin-bottom:8px}
.step-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.step-edit-row input{flex:1;padding:7px 9px;border:1.5px solid var(--input-border);border-radius:6px;font-size:12px;font-family:inherit;background:var(--input-bg);color:var(--input-text)}
.step-edit-row input:focus{outline:none;border-color:var(--primary)}
.step-edit-row .btn-icon{padding:4px 8px;border:1px solid #f5c6cb;border-radius:5px;background:var(--card-bg);color:var(--danger);cursor:pointer;font-size:12px;flex-shrink:0;transition:all .15s}
.step-edit-row .btn-icon:hover{background:var(--danger-light)}

/* CHECK-IN MODAL */
.rating-row{display:flex;gap:10px;flex-wrap:wrap}
.rating-opt{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.rating-opt input[type="radio"]{cursor:pointer;accent-color:var(--primary)}
.rating-opt .rating-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2.5px solid var(--input-border);color:var(--text-faint);transition:all .2s}
.rating-opt.r1 .rating-dot{border-color:#e74c3c;color:#e74c3c}
.rating-opt.r2 .rating-dot{border-color:#f39c12;color:#f39c12}
.rating-opt.r3 .rating-dot{border-color:#27ae60;color:#27ae60}
.rating-opt.r4 .rating-dot{border-color:#4a90d9;color:#4a90d9}
.rating-opt input:checked + .rating-dot{background:#2c3e6e;color:#fff;border-color:#2c3e6e}
.rating-label{font-size:9px;color:var(--text-muted);font-weight:600;text-align:center;max-width:52px}
.type-row{display:flex;gap:14px;margin-bottom:4px}
.type-opt{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-secondary)}
.type-opt input{cursor:pointer;accent-color:var(--primary)}

/* TEMPLATE PICKER */
.template-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:16px}
.template-card{background:var(--section-bg-light);border:2px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s,transform .15s;text-align:left;font-family:inherit;width:100%}
.template-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,144,217,.15)}
.template-card h4{margin:0 0 6px;color:var(--text-heading);font-size:13px;font-weight:700;line-height:1.3}
.template-card p{margin:0;font-size:12px;color:var(--text-muted);line-height:1.4}
.template-card .tc-icon{font-size:22px;margin-bottom:8px;display:block}
.template-modal-overlay .modal{max-width:700px}
.modal-cancel{display:block;margin-top:14px;text-align:center;font-size:11px;color:var(--text-faint);cursor:pointer;padding:6px}
.modal-cancel:hover{color:var(--text-secondary)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--toast-bg);color:var(--toast-text);padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,.2);z-index:3000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* COORDINATOR COLORS */
.coord-jmiller{background:#7e57c2}
.coord-kpatterson{background:#26a69a}
.coord-pokolo{background:#ef5350}
.coord-vpalencia{background:#42a5f5}

/* MOBILE */
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  .goals-board{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .form-field.full{grid-column:unset}
  .filter-bar{flex-direction:column;align-items:flex-start}
}
@media(max-width:600px){
  body{padding:8px}
  .header{padding:18px 16px}
  .tool-btn,.btn,.filter-bar select{min-height:44px}
  .stat-card{padding:12px 10px}
  .stat-val{font-size:22px}
}

/* PRINT */
@media print{
  body{background:#fff!important;padding:0;color:#000}
  .header .toolbar,.tool-btn,.filter-bar,.goal-card-actions,.walkthrough-connect .btn{display:none!important}
  .goal-card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  .stat-card{box-shadow:none;border:1px solid #ddd}
}
.last-saved-footer{position:fixed;bottom:0;left:0;width:100%;background:var(--footer-bg);border-top:1px solid var(--footer-border);padding:4px 16px;font-size:10px;color:var(--footer-text);text-align:right;z-index:50;font-family:inherit}
@media print{.last-saved-footer{display:none}}
.notif-bell-link{position:relative;display:inline-block;padding:6px 13px;border-radius:7px;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.13);color:#fff;font-size:14px;text-decoration:none;transition:all .15s;line-height:1;cursor:pointer}
.notif-bell-link:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.55)}
.notif-bell-badge{position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;line-height:1}
.notif-bell-badge.hidden{display:none}
@media print{.notif-bell-link{display:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <h1>&#127919; Goal-Setting &amp; Growth Planning</h1>
    <p>Set, track, and reflect on coordinator growth goals across semesters</p>
    <div class="toolbar">
      <button class="tool-btn accent" onclick="openGoalModal(null)">&#65291; New Goal</button>
      <button class="tool-btn" onclick="openGoalTemplateModal()" title="Start from a SMART goal template">&#128196; Templates</button>
      <button class="tool-btn" onclick="window.print()">&#128438; Print / PDF</button>
      <a class="notif-bell-link" href="index.html" title="Notifications" id="notifBellLink">&#128276;<span class="notif-bell-badge hidden" id="notifBellBadge">0</span></a>
      <button class="tool-btn" onclick="toggleDarkMode()" id="darkModeToggle">&#9789; Dark</button>
      <a class="tool-btn" href="index.html" style="margin-left:auto">&#127968; Home</a>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="card first-card">
    <div class="filter-bar">
      <div>
        <label for="filterCoord">Coordinator</label><br/>
        <select id="filterCoord" class="coord-select" onchange="renderGoals();renderStats()">
          <option value="">All Coordinators</option>
        </select>
      </div>
      <div>
        <label for="filterSem">Semester</label><br/>
        <select id="filterSem" onchange="renderGoals();renderStats()">
          <option value="">All Semesters</option>
          <option value="Fall 2024-25">Fall 2024-25</option>
          <option value="Spring 2024-25">Spring 2024-25</option>
          <option value="Fall 2025-26">Fall 2025-26</option>
          <option value="Spring 2025-26">Spring 2025-26</option>
          <option value="Fall 2026-27">Fall 2026-27</option>
          <option value="Spring 2026-27">Spring 2026-27</option>
        </select>
      </div>
      <div>
        <label for="filterStatus">Status</label><br/>
        <select id="filterStatus" onchange="renderGoals();renderStats()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="achieved">Achieved</option>
          <option value="discontinued">Discontinued</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Goals</div></div>
    <div class="stat-card"><div class="stat-val blue" id="statActive">0</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-val green" id="statAchieved">0</div><div class="stat-label">Achieved</div></div>
    <div class="stat-card"><div class="stat-val orange" id="statAvgRating">--</div><div class="stat-label">Avg Rating (1-4)</div></div>
  </div>

  <!-- GOALS BOARD -->
  <div class="goals-board" id="goalsBoard"></div>

</div><!-- /wrap -->

<!-- GOAL MODAL -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <h3 id="goalModalTitle">&#127919; New Goal <button class="modal-close" onclick="closeGoalModal()">&#10005;</button></h3>
    <input type="hidden" id="editGoalId"/>
    <div class="form-grid">
      <div class="form-field">
        <label>Coordinator</label>
        <select id="goalCoord" class="coord-select">
        </select>
      </div>
      <div class="form-field">
        <label>Semester</label>
        <select id="goalSem">
          <option value="Fall 2024-25">Fall 2024-25</option>

<script>
function initNotifBell(){var c=localStorage.getItem('notification_unread_count');var n=parseInt(c)||0;var b=document.getElementById('notifBellBadge');if(b){b.textContent=n>9?'9+':String(n);b.className=n>0?'notif-bell-badge':'notif-bell-badge hidden';}}
var STORAGE_KEY = 'goal_setting_data';
var appData = null;
var _saveTimer = null;

var LAST_SAVED_KEY = 'goal_setting_data_lastSaved';
function stampLastSaved(){localStorage.setItem(LAST_SAVED_KEY,String(Date.now()));renderLastSaved();}
function renderLastSaved(){var ts=localStorage.getItem(LAST_SAVED_KEY);var el=document.getElementById('lastSavedFooter');if(el)el.textContent=ts?'Last saved: '+new Date(parseInt(ts)).toLocaleString():'';}

var DEFAULT_COORDINATORS = [
  {id:"jmiller",    name:"J. Miller",    email:"jmiller@uplifteducation.org",    color:"#8e44ad"},
  {id:"kpatterson", name:"K. Patterson", email:"kpatterson@uplifteducation.org", color:"#16a085"},
  {id:"pokolo",     name:"P. Okolo",     email:"Pokolo@uplifteducation.org",     color:"#c0392b"},
  {id:"vpalencia",  name:"V. Palencia",  email:"vpalencia@uplifteducation.org",  color:"#2980b9"}
];
function getCoordinators() {
  try {
    var raw = localStorage.getItem("mlp_hub_config");
    var cfg = raw ? JSON.parse(raw) : {};
    if (cfg.coordinators && cfg.coordinators.length) return cfg.coordinators;
  } catch(e) {}
  return DEFAULT_COORDINATORS;
}

function buildCoordMaps() {
  var coords = getCoordinators();
  var names = {};
  var colors = {};
  for (var i = 0; i < coords.length; i++) {
    names[coords[i].id] = coords[i].name;
    colors[coords[i].id] = coords[i].color || '#4a90d9';
  }
  return { names: names, colors: colors };
}

function getCoordName(id) {
  var maps = buildCoordMaps();
  return maps.names[id] || id;
}

function getCoordColor(id) {
  var maps = buildCoordMaps();
  return maps.colors[id] || '#4a90d9';
}

function populateCoordDropdowns() {
  var coords = getCoordinators();
  var selects = document.querySelectorAll('.coord-select');
  for (var s = 0; s < selects.length; s++) {
    var sel = selects[s];
    var firstOpt = sel.options[0];
    sel.innerHTML = '';
    if (firstOpt) sel.appendChild(firstOpt);
    for (var c = 0; c < coords.length; c++) {
      var opt = document.createElement('option');
      opt.value = coords[c].id;
      opt.textContent = coords[c].name;
      sel.appendChild(opt);
    }
  }
}
function refreshCoordMaps() {
  var maps = buildCoordMaps();
  for (var k in COORD_NAMES) { if (COORD_NAMES.hasOwnProperty(k)) delete COORD_NAMES[k]; }
  for (var k2 in COORD_COLORS) { if (COORD_COLORS.hasOwnProperty(k2)) delete COORD_COLORS[k2]; }
  for (var key in maps.names) { if (maps.names.hasOwnProperty(key)) COORD_NAMES[key] = maps.names[key]; }
  for (var key2 in maps.colors) { if (maps.colors.hasOwnProperty(key2)) COORD_COLORS[key2] = maps.colors[key2]; }
}

window.addEventListener('focus', function(){ refreshCoordMaps(); populateCoordDropdowns(); });

var COORD_NAMES = {};
var COORD_COLORS = {};

/* =====================
   UTILITIES
   ===================== */
function escHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function genId() {
  return 'g_' + Date.now() + '_' + Math.floor(Math.random()*9999);
}

function todayStr() {
  var d = new Date();
  var mm = d.getMonth()+1;
  var dd = d.getDate();
  var yyyy = d.getFullYear();
  return yyyy + '-' + (mm<10?'0'+mm:mm) + '-' + (dd<10?'0'+dd:dd);
}

/* =====================
   PERSISTENCE
   ===================== */
function loadData() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { appData = JSON.parse(raw); } catch(e) { appData = null; }
  }
  if (!appData) {
    appData = {version: 1, goals: [], checkins: []};
  }
  if (!appData.goals) appData.goals = [];
  if (!appData.checkins) appData.checkins = [];
}

function saveData() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    stampLastSaved();
  }, 300);
}

/* =====================
   CROSS-TOOL READS
   ===================== */
function getFidelityForCoord(coordName) {
  var raw = localStorage.getItem('walkthrough_history');
  if (!raw) return null;
  var history = null;
  try { history = JSON.parse(raw); } catch(e) { return null; }
  if (!Array.isArray(history)) return null;
  var total = 0;
  var count = 0;
  history.forEach(function(session) {
    if (!session.observations) return;
    session.observations.forEach(function(obs) {
      var teacher = (obs.teacher || '').toLowerCase();
      var coordLower = coordName.toLowerCase();
      // Match by last name or first initial + last name
      var parts = coordName.split(' ');
      var lastName = parts.length > 1 ? parts[parts.length-1].toLowerCase() : coordLower;
      if (teacher.indexOf(lastName) !== -1) {
        if (typeof obs.fidelityPct === 'number') {
          total += obs.fidelityPct;
          count++;
        }
      }
    });
    // Also check session-level leader match
    if ((session.leader || '').toLowerCase().indexOf(coordName.toLowerCase().split(' ').pop()) !== -1) {
      if (typeof session.avgFidelity === 'number') {
        total += session.avgFidelity;
        count++;
      }
    }
  });
  if (!count) return null;
  return Math.round(total / count);
}

function getCycleCountForCoord(coordName) {
  var raw = localStorage.getItem('coaching_cycles_data');
  if (!raw) return {active: 0, completed: 0};
  var data = null;
  try { data = JSON.parse(raw); } catch(e) { return {active: 0, completed: 0}; }
  var cycles = (data && data.cycles) ? data.cycles : (Array.isArray(data) ? data : []);
  var active = 0;
  var completed = 0;
  var lastName = coordName.toLowerCase().split(' ').pop();
  cycles.forEach(function(c) {
    var teacher = (c.teacher || '').toLowerCase();
    if (teacher.indexOf(lastName) !== -1 || (c.campus || '').toLowerCase().indexOf(lastName) !== -1) {
      if (c.status === 'completed' || c.completed) completed++;
      else active++;
    }
  });
  return {active: active, completed: completed};
}

/* =====================
   ACTION PROGRESS
   ===================== */
function getActionProgress(goal) {
  if (!goal.actionSteps || !goal.actionSteps.length) return {done: 0, total: 0};
  var done = 0;
  goal.actionSteps.forEach(function(s) { if (s.done) done++; });
  return {done: done, total: goal.actionSteps.length};
}

/* =====================
   STATS
   ===================== */
function renderStats() {
  var filterCoord = document.getElementById('filterCoord').value;
  var filterSem = document.getElementById('filterSem').value;
  var filterStatus = document.getElementById('filterStatus').value;

  var goals = getFilteredGoals(filterCoord, filterSem, filterStatus);
  var active = 0, achieved = 0;
  goals.forEach(function(g) {
    if (g.status === 'active') active++;
    if (g.status === 'achieved') achieved++;
  });

  var goalIds = {};
  goals.forEach(function(g) { goalIds[g.id] = 1; });
  var ratingSum = 0;
  var ratingCount = 0;
  appData.checkins.forEach(function(c) {
    if (goalIds[c.goalId] && c.rating) {
      ratingSum += parseInt(c.rating, 10);
      ratingCount++;
    }
  });

  document.getElementById('statTotal').textContent = goals.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statAchieved').textContent = achieved;
  document.getElementById('statAvgRating').textContent = ratingCount ? (ratingSum/ratingCount).toFixed(1) : '--';
}

/* =====================
   FILTERING
   ===================== */
function getFilteredGoals(coordId, semester, status) {
  return appData.goals.filter(function(g) {
    if (coordId && g.coordinatorId !== coordId) return false;
    if (semester && g.semester !== semester) return false;
    if (status && g.status !== status) return false;
    return true;
  });
}

/* =====================
   GOALS RENDER
   ===================== */
function renderGoals() {
  var filterCoord = document.getElementById('filterCoord').value;
  var filterSem = document.getElementById('filterSem').value;
  var filterStatus = document.getElementById('filterStatus').value;

  var goals = getFilteredGoals(filterCoord, filterSem, filterStatus);
  var board = document.getElementById('goalsBoard');

  if (!goals.length) {
    board.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">&#127945;</div><p>No goals found. Create your first goal to get started.</p><div class="es-cta"><button class="btn btn-primary btn-lg" onclick="openGoalModal(null)">&#65291; New Goal</button></div></div>';
    return;
  }

  var html = '';
  goals.forEach(function(goal) {
    html += buildGoalCard(goal);
  });
  board.innerHTML = html;
}

function buildGoalCard(goal) {
  var coordName = COORD_NAMES[goal.coordinatorId] || goal.coordinatorName || goal.coordinatorId;
  var coordColor = COORD_COLORS[goal.coordinatorId] || '#888';
  var prog = getActionProgress(goal);
  var progPct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;

  // Check-in status
  var hasMid = false;
  var hasEnd = false;
  appData.checkins.forEach(function(c) {
    if (c.goalId === goal.id) {
      if (c.type === 'mid') hasMid = true;
      if (c.type === 'end') hasEnd = true;
    }
  });

  // Status badge
  var statusBadgeClass = 'badge-active';
  var statusLabel = 'Active';
  if (goal.status === 'achieved') { statusBadgeClass = 'badge-achieved'; statusLabel = 'Achieved'; }
  if (goal.status === 'discontinued') { statusBadgeClass = 'badge-discontinued'; statusLabel = 'Discontinued'; }

  var borderColor = goal.status === 'achieved' ? '#27ae60' : (goal.status === 'discontinued' ? '#bbb' : coordColor);

  // Walkthrough connection
  var fidelity = getFidelityForCoord(coordName);
  var cycles = getCycleCountForCoord(coordName);
  var fidelityHtml = fidelity !== null
    ? '<span class="wc-badge ' + (fidelity >= 75 ? 'green' : '') + '">' + fidelity + '% avg fidelity</span>'
    : '<span class="wc-badge gray">No walkthrough data</span>';
  var cyclesHtml = (cycles.active + cycles.completed) > 0
    ? '<span class="wc-badge">' + cycles.active + ' active / ' + cycles.completed + ' completed</span>'
    : '<span class="wc-badge gray">No cycles</span>';

  var html = '<div class="goal-card" style="border-top-color:' + coordColor + '">';
  html += '<div class="goal-card-top">';

  // Meta row
  html += '<div class="goal-card-meta">';
  html += '<span class="coord-badge" style="background:' + coordColor + '">' + escHtml(coordName) + '</span>';
  html += '<span class="semester-pill">' + escHtml(goal.semester) + '</span>';
  html += '</div>';

  // Title
  html += '<div class="goal-title">' + escHtml(goal.title) + '</div>';

  // Success metric
  if (goal.successMetric) {
    html += '<div class="goal-metric">&#127959; ' + escHtml(goal.successMetric) + '</div>';
  }

  // Manager target
  if (goal.managerTarget) {
    html += '<div class="goal-manager-target">&#127919; Target: ' + escHtml(goal.managerTarget) + '</div>';
  }

  // Action steps
  if (goal.actionSteps && goal.actionSteps.length) {
    html += '<div class="action-steps-header">Action Steps</div>';
    goal.actionSteps.forEach(function(step, idx) {
      var doneClass = step.done ? 'done' : '';
      var ck = step.done ? 'checked' : '';
      html += '<div class="action-step-row">';
      html += '<input type="checkbox" ' + ck + ' onclick="toggleStep(\'' + escHtml(goal.id) + '\',' + idx + ',this.checked)"/>';
      html += '<span class="action-step-text ' + doneClass + '">' + escHtml(step.text) + '</span>';
      html += '</div>';
    });
    html += '<div class="action-progress-bar"><div class="action-progress-fill" style="width:' + progPct + '%"></div></div>';
    html += '<div class="action-progress-label">' + prog.done + '/' + prog.total + ' steps complete</div>';
  }

  // Badges
  html += '<div class="badge-row">';
  html += '<span class="status-badge ' + statusBadgeClass + '">' + statusLabel + '</span>';
  html += '<span class="checkin-pill ' + (hasMid ? 'done-mid' : 'pending') + '">Mid ' + (hasMid ? '&#10003;' : '&#9675;') + '</span>';
  html += '<span class="checkin-pill ' + (hasEnd ? 'done-end' : 'pending') + '">End ' + (hasEnd ? '&#10003;' : '&#9675;') + '</span>';
  html += '</div>';

  html += '</div>'; // /goal-card-top

  // Walkthrough connection panel
  html += '<div class="walkthrough-connect">';
  html += '<div class="wc-item"><span class="wc-label">Walkthroughs:</span>' + fidelityHtml + '</div>';
  html += '<div class="wc-item"><span class="wc-label">Coaching:</span>' + cyclesHtml + '</div>';
  html += '</div>';

  // Card actions
  html += '<div class="goal-card-actions">';
  html += '<button class="btn primary" onclick="openCheckinModal(\'' + escHtml(goal.id) + '\')">&#43; Check-In</button>';
  html += '<button class="btn" onclick="openGoalModal(\'' + escHtml(goal.id) + '\')">&#9999; Edit</button>';
  html += '<button class="btn danger" onclick="deleteGoal(\'' + escHtml(goal.id) + '\')">&#128465; Delete</button>';
  html += '</div>';

  html += '</div>'; // /goal-card
  return html;
}

/* =====================
   TOGGLE STEP (on card)
   ===================== */
function toggleStep(goalId, stepIdx, checked) {
  for (var i = 0; i < appData.goals.length; i++) {
    if (appData.goals[i].id === goalId) {
      if (appData.goals[i].actionSteps && appData.goals[i].actionSteps[stepIdx] !== undefined) {
        appData.goals[i].actionSteps[stepIdx].done = checked;
      }
      break;
    }
  }
  saveData();
  renderGoals();
  renderStats();
}

/* =====================
   GOAL MODAL
   ===================== */
function openGoalModal(id) {
  var modal = document.getElementById('goalModal');
  var titleEl = document.getElementById('goalModalTitle');
  document.getElementById('editGoalId').value = id || '';
  document.getElementById('stepsEditList').innerHTML = '';

  if (id) {
    var goal = null;
    for (var i = 0; i < appData.goals.length; i++) {
      if (appData.goals[i].id === id) { goal = appData.goals[i]; break; }
    }
    if (!goal) { showToast('Goal not found.'); return; }
    titleEl.innerHTML = '&#9999; Edit Goal <button class="modal-close" onclick="closeGoalModal()">&#10005;</button>';
    document.getElementById('goalCoord').value = goal.coordinatorId || getCoordinators()[0].id;
    document.getElementById('goalSem').value = goal.semester || 'Fall 2025-26';
    document.getElementById('goalTitle').value = goal.title || '';
    document.getElementById('goalDesc').value = goal.description || '';
    document.getElementById('goalMetric').value = goal.successMetric || '';
    document.getElementById('goalMgrTarget').value = goal.managerTarget || '';
    document.getElementById('goalStatus').value = goal.status || 'active';
    var steps = goal.actionSteps || [];
    steps.forEach(function(s) { addStepField(s.text); });
    if (!steps.length) addStepField('');
  } else {
    titleEl.innerHTML = '&#127919; New Goal <button class="modal-close" onclick="closeGoalModal()">&#10005;</button>';
    document.getElementById('goalCoord').value = getCoordinators()[0].id;
    document.getElementById('goalSem').value = 'Fall 2025-26';
    document.getElementById('goalTitle').value = '';
    document.getElementById('goalDesc').value = '';
    document.getElementById('goalMetric').value = '';
    document.getElementById('goalMgrTarget').value = '';
    document.getElementById('goalStatus').value = 'active';
    addStepField('');
  }

  modal.classList.add('open');
}

function closeGoalModal() {
  document.getElementById('goalModal').classList.remove('open');
}

function addStepField(text) {
  var list = document.getElementById('stepsEditList');
  var idx = list.children.length;
  var div = document.createElement('div');
  div.className = 'step-edit-row';
  div.innerHTML = '<input type="text" placeholder="Action step ' + (idx+1) + '..." value="' + escHtml(text || '') + '"/><button class="btn-icon" onclick="removeStepField(this)" title="Remove step">&#10005;</button>';
  list.appendChild(div);
}

function removeStepField(btn) {
  var row = btn.parentNode;
  row.parentNode.removeChild(row);
}

function saveGoal() {
  var id = document.getElementById('editGoalId').value;
  var coordId = document.getElementById('goalCoord').value;
  var semester = document.getElementById('goalSem').value;
  var title = document.getElementById('goalTitle').value.trim();
  var desc = document.getElementById('goalDesc').value.trim();
  var metric = document.getElementById('goalMetric').value.trim();
  var mgrTarget = document.getElementById('goalMgrTarget').value.trim();
  var status = document.getElementById('goalStatus').value;

  if (!title) { showToast('Goal title is required.'); return; }

  // Collect action steps
  var steps = [];
  var stepInputs = document.getElementById('stepsEditList').querySelectorAll('input[type="text"]');
  for (var i = 0; i < stepInputs.length; i++) {
    var txt = stepInputs[i].value.trim();
    if (txt) steps.push({text: txt, done: false});
  }
  if (!steps.length) { showToast('At least one action step is required.'); return; }

  if (id) {
    // Edit
    for (var j = 0; j < appData.goals.length; j++) {
      if (appData.goals[j].id === id) {
        var existing = appData.goals[j];
        // Preserve done state for existing steps by matching text
        var prevSteps = existing.actionSteps || [];
        var prevMap = {};
        prevSteps.forEach(function(ps) { prevMap[ps.text] = ps.done; });
        steps = steps.map(function(s) {
          return {text: s.text, done: prevMap[s.text] || false};
        });
        existing.coordinatorId = coordId;
        existing.coordinatorName = COORD_NAMES[coordId];
        existing.semester = semester;
        existing.title = title;
        existing.description = desc;
        existing.successMetric = metric;
        existing.managerTarget = mgrTarget;
        existing.actionSteps = steps;
        existing.status = status;
        break;
      }
    }
    showToast('Goal updated.');
  } else {
    // New
    var newGoal = {
      id: genId(),
      coordinatorId: coordId,
      coordinatorName: COORD_NAMES[coordId],
      semester: semester,
      title: title,
      description: desc,
      successMetric: metric,
      managerTarget: mgrTarget,
      actionSteps: steps,
      status: status,
      createdAt: new Date().toISOString(),
      createdBy: 'manager'
    };
    appData.goals.push(newGoal);
    showToast('Goal created.');
  }

  saveData();
  closeGoalModal();
  renderGoals();
  renderStats();
}

function deleteGoal(id) {
  if (!confirm('Delete this goal? All check-ins for this goal will also be removed.')) return;
  appData.goals = appData.goals.filter(function(g) { return g.id !== id; });
  appData.checkins = appData.checkins.filter(function(c) { return c.goalId !== id; });
  saveData();
  renderGoals();
  renderStats();
  showToast('Goal deleted.');
}

   GOAL TEMPLATE MODAL
   ===================== */
var GOAL_TEMPLATES = {
  "walkthrough-freq": {
    title: "Complete [X] walkthroughs per campus per month",
    category: "Instructional Leadership",
    description: "Establish a regular walkthrough schedule to provide consistent feedback to ESL teachers and monitor ELPS implementation fidelity."
  },
  "coaching-completion": {
    title: "Complete full coaching cycles with [X]% of teachers by end of semester",
    category: "Teacher Development",
    description: "Launch and complete coaching cycles with priority teachers, documenting action steps and growth evidence at each stage."
  },
  "telpas-growth": {
    title: "[X]% of EB students advance at least one TELPAS proficiency level",
    category: "Student Achievement",
    description: "Implement targeted language instruction strategies and monitor TELPAS progress indicators throughout the year."
  },
  "parent-comm": {
    title: "Conduct [X] parent contacts per month across all assigned campuses",
    category: "Family Engagement",
    description: "Establish regular parent communication to inform families of student progress and available ESL supports."
  }
};

function openGoalTemplateModal(){
  document.getElementById("goalTemplateModal").classList.add("open");
}

function closeGoalTemplateModal(){
  document.getElementById("goalTemplateModal").classList.remove("open");
}

function applyGoalTemplate(templateId){
  var tpl = GOAL_TEMPLATES[templateId];
  if(!tpl) return;
  closeGoalTemplateModal();

  // Open new goal modal
  openGoalModal(null);

  // Pre-fill fields
  var titleEl = document.getElementById("goalTitle");
  var descEl = document.getElementById("goalDesc");

  if(titleEl) titleEl.value = tpl.title;
  if(descEl) descEl.value = tpl.description;

  // Focus title field so user can immediately edit the [X] placeholder
  if(titleEl) titleEl.focus();

  showToast("Template loaded \u2014 fill in your specific targets and save");
}

/* =====================
   CHECK-IN MODAL
   ===================== */
function openCheckinModal(goalId) {
  document.getElementById('checkinGoalId').value = goalId;
  document.querySelectorAll('input[name="checkinType"]')[0].checked = true;
  document.getElementById('checkinDate').value = todayStr();
  document.getElementById('checkinEvidence').value = '';
  var ratings = document.querySelectorAll('input[name="checkinRating"]');
  for (var i = 0; i < ratings.length; i++) ratings[i].checked = false;
  document.getElementById('checkinMgrNotes').value = '';
  document.getElementById('checkinCoordNotes').value = '';
  document.getElementById('checkinModal').classList.add('open');
}

function closeCheckinModal() {
  document.getElementById('checkinModal').classList.remove('open');
}

function saveCheckin() {
  var goalId = document.getElementById('checkinGoalId').value;
  if (!goalId) { showToast('No goal selected.'); return; }

  var typeRadios = document.querySelectorAll('input[name="checkinType"]');
  var type = 'mid';
  for (var i = 0; i < typeRadios.length; i++) {
    if (typeRadios[i].checked) { type = typeRadios[i].value; break; }
  }

  var date = document.getElementById('checkinDate').value;
  var evidence = document.getElementById('checkinEvidence').value.trim();
  var mgrNotes = document.getElementById('checkinMgrNotes').value.trim();
  var coordNotes = document.getElementById('checkinCoordNotes').value.trim();

  var ratingRadios = document.querySelectorAll('input[name="checkinRating"]');
  var rating = 0;
  for (var j = 0; j < ratingRadios.length; j++) {
    if (ratingRadios[j].checked) { rating = parseInt(ratingRadios[j].value, 10); break; }
  }

  if (!rating) { showToast('Please select a rating.'); return; }
  if (!date) { showToast('Please enter a date.'); return; }

  var checkin = {
    id: genId(),
    goalId: goalId,
    type: type,
    date: date,
    evidence: evidence,
    rating: rating,
    managerNotes: mgrNotes,
    coordinatorNotes: coordNotes,
    createdAt: new Date().toISOString()
  };

  appData.checkins.push(checkin);
  saveData();
  closeCheckinModal();
  renderGoals();
  renderStats();
  showToast('Check-in saved.');
}

/* =====================
   DARK MODE
   ===================== */
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  var isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('esl_app_theme', isDark ? 'dark' : 'light');
  document.getElementById('darkModeToggle').textContent = isDark ? '\u2600 Light' : '\u263d Dark';
}

function applyTheme() {
  var theme = localStorage.getItem('esl_app_theme');
  if (theme === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('darkModeToggle').textContent = '\u2600 Light';
  }
}

(function(){
  try {
    var raw = localStorage.getItem("mlp_hub_config");
    var cfg = raw ? JSON.parse(raw) : {};
    var THEMES = {
      "default":{primary:"#4a90d9",primaryDark:"#2c3e6e",headerGrad1:"#2c3e6e",headerGrad2:"#4a90d9"},
      "forest":{primary:"#27ae60",primaryDark:"#1a5c35",headerGrad1:"#1a5c35",headerGrad2:"#27ae60"},
      "sunset":{primary:"#e67e22",primaryDark:"#8e4400",headerGrad1:"#8e4400",headerGrad2:"#e67e22"},
      "ruby":{primary:"#c0392b",primaryDark:"#7b1f1f",headerGrad1:"#7b1f1f",headerGrad2:"#c0392b"},
      "slate":{primary:"#607d8b",primaryDark:"#37474f",headerGrad1:"#37474f",headerGrad2:"#607d8b"},
      "royal":{primary:"#8e44ad",primaryDark:"#5b2d73",headerGrad1:"#5b2d73",headerGrad2:"#8e44ad"},
      "teal":{primary:"#0097a7",primaryDark:"#006064",headerGrad1:"#006064",headerGrad2:"#0097a7"},

    };

    var r = document.documentElement.style;

      r.setProperty("--text-heading", light);
      r.setProperty("--toast-bg", light);
      r.setProperty("--toast-text", colors.primaryDark);
    }
    if (cfg.orgName) {
      var h1 = document.querySelector(".header h1");

    }
  } catch(e){}
})();
