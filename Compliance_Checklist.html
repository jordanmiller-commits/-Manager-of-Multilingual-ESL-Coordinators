<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESL Program Compliance Checklist</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#2c3e6e"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f7;min-height:100vh;padding:20px;color:#333}
.wrap{max-width:1100px;margin:0 auto}

/* HEADER */
.header{background:linear-gradient(135deg,#2c3e6e,#4a90d9);color:#fff;padding:24px 28px 16px;border-radius:14px 14px 0 0}
.header h1{font-size:22px;font-weight:800;margin-bottom:2px}
.header p{font-size:12px;opacity:.85;margin-bottom:12px}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tool-btn{background:rgba(255,255,255,.13);color:#fff;border:2px solid rgba(255,255,255,.35);padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.tool-btn:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.55)}
.tool-btn.accent{border-color:rgba(46,204,113,.5);background:rgba(46,204,113,.15)}
.tool-btn.accent:hover{background:rgba(46,204,113,.3)}

/* CARDS */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);padding:18px 20px;margin-bottom:14px}
.first-card{border-radius:0 0 10px 10px;margin-top:0;margin-bottom:14px}

/* CONTROL BAR */
.control-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.control-bar label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px}
.control-bar select{padding:7px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#333;cursor:pointer}
.control-bar select:focus{outline:none;border-color:#4a90d9;box-shadow:0 0 0 2px rgba(74,144,217,.15)}
.campus-add-wrap{display:flex;gap:6px;align-items:center;margin-left:auto}
.campus-add-wrap input{padding:7px 10px;border:1.5px solid #ddd;border-radius:7px;font-size:12px;font-family:inherit}
.campus-add-wrap input:focus{outline:none;border-color:#4a90d9}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-weight:600;color:#555;font-family:inherit;transition:all .15s}
.btn-sm:hover{background:#eaf3fb;border-color:#4a90d9;color:#2c3e6e}
.btn-sm.primary{background:#4a90d9;color:#fff;border-color:#4a90d9}
.btn-sm.primary:hover{background:#3a7bc8}
.btn-sm.danger{color:#e74c3c;border-color:#f5c6cb}
.btn-sm.danger:hover{background:#fdecea;border-color:#e74c3c}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:16px}
.progress-label{font-size:12px;font-weight:700;color:#555;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.progress-track{height:10px;background:#eee;border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;transition:width .4s;background:linear-gradient(90deg,#4a90d9,#27ae60)}
.progress-fill.warn{background:linear-gradient(90deg,#f39c12,#e67e22)}
.progress-fill.danger{background:linear-gradient(90deg,#e74c3c,#c0392b)}

/* CATEGORY SECTIONS */
.section-title{display:flex;align-items:center;gap:10px;padding:10px 0 8px;border-bottom:2px solid #e8edf5;margin-bottom:8px;margin-top:16px}
.section-title:first-child{margin-top:0}
.section-name{font-size:14px;font-weight:800;color:#2c3e6e}
.section-badge{background:#e3f2fd;color:#1565c0;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;border:1px solid #bbdefb}
.section-badge.complete{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.section-badge.partial{background:#fff8e1;color:#f57f17;border-color:#fff176}

/* CHECKLIST ROWS */
.item-row{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:6px;transition:background .15s}
.item-row:hover{background:#f8f9fb}
.item-row+.item-row{border-top:1px solid #f0f2f7}
.item-check{width:20px;height:20px;min-width:20px;margin-top:2px;cursor:pointer;accent-color:#4a90d9}
.item-content{flex:1;min-width:0}
.item-text{font-size:13px;color:#333;line-height:1.5}
.item-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.required-badge{background:#fff3e0;color:#e65100;font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px;border:1px solid #ffe0b2}
.date-note{font-size:10px;color:#27ae60;font-weight:600}
.item-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.notes-toggle{padding:3px 9px;font-size:10px;border-radius:5px;border:1px solid #ddd;background:#f8f9fb;cursor:pointer;color:#555;font-family:inherit;transition:all .15s}
.notes-toggle:hover{background:#eaf3fb;border-color:#4a90d9;color:#2c3e6e}
.notes-area{margin-top:8px;display:none}
.notes-area.open{display:block}
.notes-area textarea{width:100%;min-height:58px;padding:7px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;background:#fafbfd;color:#333}
.notes-area textarea:focus{outline:none;border-color:#4a90d9}
.completedby-wrap{display:flex;align-items:center;gap:6px;margin-top:6px}
.completedby-wrap label{font-size:10px;color:#888;font-weight:600;white-space:nowrap}
.completedby-wrap input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:11px;font-family:inherit;background:#fafbfd}
.completedby-wrap input:focus{outline:none;border-color:#4a90d9}

/* EMPTY STATES */
.empty-state{text-align:center;padding:40px 20px;color:#aaa;font-size:13px;font-style:italic}
.no-campus-msg{background:#fff8e1;color:#f57f17;border:1px solid #fff176;border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:14px}

/* CAMPUS SUMMARY */
.campus-summary-header{font-size:14px;font-weight:800;color:#2c3e6e;margin-bottom:12px}
.campus-cards-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.campus-card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);padding:14px 16px;min-width:150px;flex-shrink:0;border-top:4px solid #ddd;text-align:center;transition:box-shadow .15s}
.campus-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.campus-card.green{border-top-color:#27ae60}
.campus-card.yellow{border-top-color:#f39c12}
.campus-card.red{border-top-color:#e74c3c}
.campus-card .cc-name{font-size:12px;font-weight:700;color:#2c3e6e;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.campus-card .cc-pct{font-size:26px;font-weight:900;line-height:1}
.campus-card.green .cc-pct{color:#27ae60}
.campus-card.yellow .cc-pct{color:#f39c12}
.campus-card.red .cc-pct{color:#e74c3c}
.campus-card .cc-label{font-size:9px;color:#888;text-transform:uppercase;font-weight:600;margin-top:3px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:flex-start;z-index:1000;padding:30px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:600px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.2);margin:auto}
.modal h3{font-size:17px;font-weight:800;color:#2c3e6e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.modal-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#888;padding:0 4px;line-height:1}
.modal-close:hover{color:#333}

/* ITEMS MODAL */
.item-list{max-height:340px;overflow-y:auto;border:1px solid #eee;border-radius:8px;margin-bottom:14px}
.item-list-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #f0f2f7;font-size:12px}
.item-list-row:last-child{border-bottom:none}
.item-list-row:hover{background:#f8f9fb}
.ilr-cat{background:#e3f2fd;color:#1565c0;font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px;white-space:nowrap}
.ilr-text{flex:1;min-width:0;color:#333}
.ilr-req{font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px;cursor:pointer;border:1px solid transparent}
.ilr-req.yes{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.ilr-req.no{background:#f5f5f5;color:#888;border-color:#ddd}
.add-item-form{background:#f8f9fb;border-radius:8px;padding:14px;border:1px solid #eee}
.add-item-form .form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-field label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase}
.form-field input,.form-field textarea,.form-field select{padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{outline:none;border-color:#4a90d9}
.toggle-req{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;background:#fff;user-select:none;height:34px}
.toggle-req.active{border-color:#e65100;background:#fff3e0;color:#e65100}

/* CAMPUS MANAGE */
.campus-manage-list{max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;margin-bottom:10px}
.campus-manage-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #f0f2f7;font-size:12px}
.campus-manage-row:last-child{border-bottom:none}
.campus-manage-row .cname{flex:1;color:#333}

/* REPORT */
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:2000;overflow-y:auto;padding:30px;display:none}
.report-overlay.open{display:block}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.report-header h2{font-size:20px;font-weight:800;color:#2c3e6e}
.report-table-wrap{overflow-x:auto}
.report-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.report-table th{background:#2c3e6e;color:#fff;padding:8px 10px;text-align:left;white-space:nowrap}
.report-table td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:top}
.report-table tr:nth-child(even) td{background:#f8f9fb}
.report-table .check{color:#27ae60;font-weight:700;font-size:14px}
.report-table .uncheck{color:#ccc;font-size:14px}
.req-mark{color:#e65100;font-weight:700;font-size:10px;margin-left:3px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#2c3e6e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,.2);z-index:3000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* DARK MODE */
body.dark-mode{background:#1a1a2e;color:#e0e0e0}
body.dark-mode .header{background:linear-gradient(135deg,#1a1a2e,#2d3a6e)}
body.dark-mode .card{background:#16213e;box-shadow:0 1px 5px rgba(0,0,0,.3)}
body.dark-mode .first-card{background:#16213e}
body.dark-mode .control-bar select{background:#16213e;color:#e0e0e0;border-color:#2d3a6e}
body.dark-mode .btn-sm{background:#16213e;color:#ccc;border-color:#2d3a6e}
body.dark-mode .btn-sm:hover{background:#1a2744;border-color:#4a90d9;color:#7eb8f7}
body.dark-mode .item-row:hover{background:#1a2744}
body.dark-mode .item-text{color:#ccc}
body.dark-mode .section-name{color:#7eb8f7}
body.dark-mode .notes-toggle{background:#16213e;color:#ccc;border-color:#2d3a6e}
body.dark-mode .notes-toggle:hover{background:#1a2744;border-color:#4a90d9;color:#7eb8f7}
body.dark-mode .notes-area textarea{background:#1a2744;color:#e0e0e0;border-color:#2d3a6e}
body.dark-mode .completedby-wrap input{background:#1a2744;color:#e0e0e0;border-color:#2d3a6e}
body.dark-mode .campus-card{background:#16213e}
body.dark-mode .campus-card .cc-name{color:#7eb8f7}
body.dark-mode .progress-track{background:#2d3a6e}
body.dark-mode .modal{background:#16213e;color:#e0e0e0}
body.dark-mode .modal h3{color:#7eb8f7}
body.dark-mode .item-list{border-color:#2d3a6e}
body.dark-mode .item-list-row{border-color:#2d3a6e}
body.dark-mode .item-list-row:hover{background:#1a2744}
body.dark-mode .ilr-text{color:#ccc}
body.dark-mode .add-item-form{background:#1a2744;border-color:#2d3a6e}
body.dark-mode .form-field input,.dark-mode .form-field select{background:#16213e;color:#e0e0e0;border-color:#2d3a6e}
body.dark-mode .toggle-req{background:#16213e;color:#ccc;border-color:#2d3a6e}
body.dark-mode .campus-manage-list{border-color:#2d3a6e}
body.dark-mode .campus-manage-row{border-color:#2d3a6e}
body.dark-mode .campus-manage-row .cname{color:#ccc}
body.dark-mode .toast{background:#7eb8f7;color:#1a1a2e}
body.dark-mode .no-campus-msg{background:#3e2a10;color:#f5c842;border-color:#5a3e15}
body.dark-mode .section-badge{background:#0d2847;color:#64b5f6;border-color:#1a3a5c}
body.dark-mode .section-badge.complete{background:#1a3a1a;color:#66bb6a;border-color:#2a5a2a}
body.dark-mode .section-badge.partial{background:#3e2a10;color:#f5c842;border-color:#5a3e15}

/* MOBILE */
@media(max-width:768px){
  .control-bar{flex-direction:column;align-items:flex-start}
  .campus-add-wrap{margin-left:0}
}
@media(max-width:600px){
  body{padding:8px}
  .header{padding:18px 16px}
  .tool-btn,.control-bar select,.btn-sm,.item-check,.notes-toggle{min-height:44px}
  .campus-cards-row{gap:8px}
  .campus-card{min-width:120px;padding:10px 12px}
}

/* PRINT */
@media print{
  body{background:#fff!important;padding:0;color:#000}
  .header .toolbar,.tool-btn,.control-bar,.campus-cards-row,.report-overlay .report-header button{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd}
  .item-row:hover{background:transparent}
  .notes-area.open textarea{border:1px solid #ddd;background:#fff}
  .report-table th{background:#2c3e6e!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <h1>&#9989; ESL Program Compliance Checklist</h1>
    <p>Track ESL program compliance across campuses and semesters</p>
    <div class="toolbar">
      <button class="tool-btn accent" onclick="generateReport()">&#128196; Generate Report</button>
      <button class="tool-btn" onclick="openItemsModal()">&#9999; Manage Items</button>
      <button class="tool-btn" onclick="openCampusModal()">&#127970; Manage Campuses</button>
      <button class="tool-btn" onclick="toggleDarkMode()" id="darkModeToggle">&#9789; Dark</button>
      <a class="tool-btn" href="index.html" style="margin-left:auto">&#127968; Home</a>
    </div>
  </div>

  <!-- CONTROL BAR -->
  <div class="card first-card">
    <div class="control-bar">
      <div>
        <label for="semSelect">Semester</label><br/>
        <select id="semSelect" onchange="renderChecklist();renderCampusSummary()"></select>
      </div>
      <div>
        <label for="campusSelect">Campus</label><br/>
        <select id="campusSelect" onchange="renderChecklist()"></select>
      </div>
    </div>
  </div>

  <!-- CHECKLIST AREA -->
  <div class="card" id="checklistCard">
    <div id="checklistArea"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- CAMPUS SUMMARY -->
  <div class="card" id="campusSummaryCard">
    <div class="campus-summary-header">Campus Completion &mdash; Current Semester</div>
    <div class="campus-cards-row" id="campusSummaryRow"></div>
  </div>

</div><!-- /wrap -->

<!-- ITEMS MODAL -->
<div class="modal-overlay" id="itemsModal">
  <div class="modal">
    <h3>&#9999; Manage Checklist Items <button class="modal-close" onclick="closeItemsModal()">&#10005;</button></h3>
    <div class="modal-section-title">Current Items</div>
    <div class="item-list" id="itemListContainer"></div>
    <div class="modal-section-title">Add New Item</div>
    <div class="add-item-form">
      <div class="form-row">
        <div class="form-field" style="flex:1;min-width:140px">
          <label>Category</label>
          <input type="text" id="newItemCat" placeholder="e.g., Documentation" list="catDatalist"/>
          <datalist id="catDatalist"></datalist>
        </div>
        <div class="form-field" style="flex:2;min-width:180px">
          <label>Item Text</label>
          <input type="text" id="newItemText" placeholder="Describe the requirement..."/>
        </div>
        <div style="display:flex;align-items:flex-end;gap:6px">
          <div id="reqToggle" class="toggle-req" onclick="toggleNewRequired()" title="Toggle required">
            <span id="reqToggleIcon">&#9675;</span> Required
          </div>
          <button class="btn-sm primary" onclick="addItem()" style="height:34px">+ Add</button>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;justify-content:flex-end">
      <button class="btn-sm primary" onclick="closeItemsModal()">Save &amp; Close</button>
    </div>
  </div>
</div>

<!-- CAMPUS MODAL -->
<div class="modal-overlay" id="campusModal">
  <div class="modal">
    <h3>&#127970; Manage Campuses <button class="modal-close" onclick="closeCampusModal()">&#10005;</button></h3>
    <div class="modal-section-title">Campuses</div>
    <div class="campus-manage-list" id="campusManageList"></div>
    <div class="add-item-form" style="margin-top:10px">
      <div class="form-row">
        <div class="form-field" style="flex:1">
          <label>Campus Name</label>
          <input type="text" id="newCampusName" placeholder="e.g., East Campus"/>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn-sm primary" onclick="addCampus()" style="height:34px">+ Add</button>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;justify-content:flex-end">
      <button class="btn-sm primary" onclick="closeCampusModal()">Save &amp; Close</button>
    </div>
  </div>
</div>

<!-- REPORT OVERLAY -->
<div class="report-overlay" id="reportOverlay">
  <div class="report-header">
    <h2 id="reportTitle">Compliance Report</h2>
    <div style="display:flex;gap:8px">
      <button class="btn-sm primary" onclick="window.print()">&#128438; Print / Save PDF</button>
      <button class="btn-sm" onclick="closeReport()">&#10005; Close</button>
    </div>
  </div>
  <div class="report-table-wrap">
    <table class="report-table" id="reportTable"></table>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'compliance_checklist_data';
var SEMESTERS = ['Fall 2024-25','Spring 2024-25','Fall 2025-26','Spring 2025-26','Fall 2026-27','Spring 2026-27'];
var appData = null;
var newItemRequired = false;
var _saveTimer = null;

/* =====================
   UTILITIES
   ===================== */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function genId() {
  return 'ci_' + Date.now() + '_' + Math.floor(Math.random()*9999);
}

/* =====================
   PERSISTENCE
   ===================== */
function loadData() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { appData = JSON.parse(raw); } catch(e) { appData = null; }
  }
  if (!appData) {
    appData = {
      version: 1,
      items: [],
      completions: {},
      settings: {
        semesters: SEMESTERS,
        campuses: []
      }
    };
  }
  if (!appData.settings) appData.settings = {semesters: SEMESTERS, campuses: []};
  if (!appData.settings.campuses) appData.settings.campuses = [];
  if (!appData.settings.semesters) appData.settings.semesters = SEMESTERS;
  if (!appData.items) appData.items = [];
  if (!appData.completions) appData.completions = {};
}

function saveData() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }, 300);
}

/* =====================
   COMPLETION KEY
   ===================== */
function getCompletionKey(semester, campus, itemId) {
  return semester + '_' + campus + '_' + itemId;
}

function getCompletion(semester, campus, itemId) {
  var key = getCompletionKey(semester, campus, itemId);
  return appData.completions[key] || {checked: false, notes: '', date: '', completedBy: ''};
}

function setCompletion(semester, campus, itemId, obj) {
  var key = getCompletionKey(semester, campus, itemId);
  appData.completions[key] = obj;
  saveData();
}

function getCompletionPct(semester, campus) {
  if (!appData.items.length) return 0;
  var done = 0;
  for (var i = 0; i < appData.items.length; i++) {
    var c = getCompletion(semester, campus, appData.items[i].id);
    if (c.checked) done++;
  }
  return Math.round((done / appData.items.length) * 100);
}

/* =====================
   DROPDOWNS
   ===================== */
function populateDropdowns() {
  var semSel = document.getElementById('semSelect');
  var campusSel = document.getElementById('campusSelect');
  var prevSem = semSel.value;
  var prevCampus = campusSel.value;
  semSel.innerHTML = '';
  appData.settings.semesters.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    if (s === prevSem) opt.selected = true;
    semSel.appendChild(opt);
  });
  campusSel.innerHTML = '<option value="">-- Select Campus --</option>';
  appData.settings.campuses.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === prevCampus) opt.selected = true;
    campusSel.appendChild(opt);
  });
}

function getSelectedSemester() { return document.getElementById('semSelect').value || ''; }
function getSelectedCampus() { return document.getElementById('campusSelect').value || ''; }

/* =====================
   CHECKLIST RENDER
   ===================== */
function renderChecklist() {
  var semester = getSelectedSemester();
  var campus = getSelectedCampus();
  var area = document.getElementById('checklistArea');

  if (!campus) {
    area.innerHTML = '<div class="no-campus-msg">&#128205; Please select a campus to view the checklist. Use <strong>Manage Campuses</strong> to add campuses.</div>';
    return;
  }
  if (!appData.items.length) {
    area.innerHTML = '<div class="empty-state">No items yet. Click <strong>Manage Items</strong> to add checklist requirements.</div>';
    return;
  }

  // Group by category
  var cats = {};
  var catOrder = [];
  appData.items.forEach(function(item) {
    var cat = item.category || 'General';
    if (!cats[cat]) { cats[cat] = []; catOrder.push(cat); }
    cats[cat].push(item);
  });

  var total = appData.items.length;
  var done = 0;
  appData.items.forEach(function(item) {
    if (getCompletion(semester, campus, item.id).checked) done++;
  });
  var pct = total ? Math.round((done/total)*100) : 0;
  var fillClass = pct >= 80 ? '' : (pct >= 50 ? 'warn' : 'danger');

  var html = '';
  html += '<div class="progress-wrap">';
  html += '<div class="progress-label"><span>' + done + ' of ' + total + ' items complete for ' + escHtml(campus) + '</span><span style="font-size:18px;font-weight:900;color:' + (pct>=80?'#27ae60':pct>=50?'#f39c12':'#e74c3c') + '">' + pct + '%</span></div>';
  html += '<div class="progress-track"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  catOrder.forEach(function(cat) {
    var items = cats[cat];
    var catDone = 0;
    items.forEach(function(it) {
      if (getCompletion(semester, campus, it.id).checked) catDone++;
    });
    var catBadgeClass = catDone === items.length ? 'complete' : (catDone > 0 ? 'partial' : '');
    html += '<div class="section-title">';
    html += '<span class="section-name">' + escHtml(cat) + '</span>';
    html += '<span class="section-badge ' + catBadgeClass + '">' + catDone + '/' + items.length + ' complete</span>';
    html += '</div>';

    items.forEach(function(item) {
      var comp = getCompletion(semester, campus, item.id);
      var ck = comp.checked ? 'checked' : '';
      var notesOpen = comp.notes ? 'open' : '';
      html += '<div class="item-row" id="row_' + escHtml(item.id) + '">';
      html += '<input type="checkbox" class="item-check" ' + ck + ' onclick="toggleItem(\'' + escHtml(item.id) + '\',this.checked)" title="Mark complete"/>';
      html += '<div class="item-content">';
      html += '<div class="item-text">' + escHtml(item.text) + '</div>';
      html += '<div class="item-meta">';
      if (item.required) html += '<span class="required-badge">REQUIRED</span>';
      if (comp.checked && comp.date) html += '<span class="date-note">&#10003; ' + escHtml(comp.date) + '</span>';
      html += '</div>';
      html += '<div class="notes-area ' + notesOpen + '" id="notes_' + escHtml(item.id) + '">';
      html += '<textarea placeholder="Add notes..." onchange="saveNotes(\'' + escHtml(item.id) + '\',this.value)">' + escHtml(comp.notes) + '</textarea>';
      html += '<div class="completedby-wrap"><label>Completed by:</label><input type="text" value="' + escHtml(comp.completedBy) + '" placeholder="Name..." onchange="saveCompletedBy(\'' + escHtml(item.id) + '\',this.value)"/></div>';
      html += '</div>';
      html += '</div>';
      html += '<div class="item-actions"><button class="notes-toggle" onclick="toggleNotes(\'' + escHtml(item.id) + '\')">Notes</button></div>';
      html += '</div>';
    });
  });

  area.innerHTML = html;
}

function toggleItem(itemId, checked) {
  var semester = getSelectedSemester();
  var campus = getSelectedCampus();
  var comp = getCompletion(semester, campus, itemId);
  comp.checked = checked;
  if (checked && !comp.date) {
    var now = new Date();
    comp.date = (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear();
  } else if (!checked) {
    comp.date = '';
  }
  setCompletion(semester, campus, itemId, comp);
  renderChecklist();
  renderCampusSummary();
}

function toggleNotes(itemId) {
  var el = document.getElementById('notes_' + itemId);
  if (el) el.classList.toggle('open');
}

function saveNotes(itemId, val) {
  var semester = getSelectedSemester();
  var campus = getSelectedCampus();
  var comp = getCompletion(semester, campus, itemId);
  comp.notes = val;
  setCompletion(semester, campus, itemId, comp);
}

function saveCompletedBy(itemId, val) {
  var semester = getSelectedSemester();
  var campus = getSelectedCampus();
  var comp = getCompletion(semester, campus, itemId);
  comp.completedBy = val;
  setCompletion(semester, campus, itemId, comp);
}

/* =====================
   CAMPUS SUMMARY
   ===================== */
function renderCampusSummary() {
  var semester = getSelectedSemester();
  var row = document.getElementById('campusSummaryRow');
  if (!appData.settings.campuses.length) {
    row.innerHTML = '<div style="color:#aaa;font-size:12px;font-style:italic;padding:10px">No campuses added yet.</div>';
    return;
  }
  var html = '';
  appData.settings.campuses.forEach(function(c) {
    var pct = appData.items.length ? getCompletionPct(semester, c) : 0;
    var colorClass = pct >= 80 ? 'green' : (pct >= 50 ? 'yellow' : 'red');
    html += '<div class="campus-card ' + colorClass + '">';
    html += '<div class="cc-name" title="' + escHtml(c) + '">' + escHtml(c) + '</div>';
    html += '<div class="cc-pct">' + pct + '%</div>';
    html += '<div class="cc-label">Complete</div>';
    html += '</div>';
  });
  row.innerHTML = html;
}

/* =====================
   ITEMS MODAL
   ===================== */
function openItemsModal() {
  renderItemList();
  updateCatDatalist();
  document.getElementById('itemsModal').classList.add('open');
}

function closeItemsModal() {
  document.getElementById('itemsModal').classList.remove('open');
  renderChecklist();
  renderCampusSummary();
}

function renderItemList() {
  var container = document.getElementById('itemListContainer');
  if (!appData.items.length) {
    container.innerHTML = '<div class="empty-state" style="padding:20px">No items yet. Add one below.</div>';
    return;
  }
  var html = '';
  appData.items.forEach(function(item) {
    var reqClass = item.required ? 'yes' : 'no';
    var reqLabel = item.required ? 'Required' : 'Optional';
    html += '<div class="item-list-row">';
    html += '<span class="ilr-cat">' + escHtml(item.category || 'General') + '</span>';
    html += '<span class="ilr-text">' + escHtml(item.text) + '</span>';
    html += '<button class="ilr-req ' + reqClass + '" onclick="toggleRequired(\'' + escHtml(item.id) + '\')" title="Toggle required">' + reqLabel + '</button>';
    html += '<button class="btn-sm danger" onclick="deleteItem(\'' + escHtml(item.id) + '\')" title="Delete item">&#10005;</button>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function updateCatDatalist() {
  var dl = document.getElementById('catDatalist');
  var cats = {};
  appData.items.forEach(function(it) { cats[it.category || 'General'] = 1; });
  dl.innerHTML = '';
  Object.keys(cats).forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    dl.appendChild(opt);
  });
}

function toggleNewRequired() {
  newItemRequired = !newItemRequired;
  var btn = document.getElementById('reqToggle');
  var icon = document.getElementById('reqToggleIcon');
  if (newItemRequired) {
    btn.classList.add('active');
    icon.textContent = '\u25cf';
  } else {
    btn.classList.remove('active');
    icon.textContent = '\u25cb';
  }
}

function addItem() {
  var cat = document.getElementById('newItemCat').value.trim();
  var text = document.getElementById('newItemText').value.trim();
  if (!text) { showToast('Item text is required.'); return; }
  if (!cat) cat = 'General';
  var item = {
    id: genId(),
    text: text,
    category: cat,
    required: newItemRequired
  };
  appData.items.push(item);
  saveData();
  document.getElementById('newItemCat').value = '';
  document.getElementById('newItemText').value = '';
  newItemRequired = false;
  document.getElementById('reqToggle').classList.remove('active');
  document.getElementById('reqToggleIcon').textContent = '\u25cb';
  renderItemList();
  updateCatDatalist();
  showToast('Item added.');
}

function toggleRequired(id) {
  for (var i = 0; i < appData.items.length; i++) {
    if (appData.items[i].id === id) {
      appData.items[i].required = !appData.items[i].required;
      break;
    }
  }
  saveData();
  renderItemList();
}

function deleteItem(id) {
  if (!confirm('Delete this checklist item? Completion data for this item will also be removed.')) return;
  appData.items = appData.items.filter(function(it) { return it.id !== id; });
  var newComp = {};
  Object.keys(appData.completions).forEach(function(k) {
    if (k.indexOf(id) === -1) newComp[k] = appData.completions[k];
  });
  appData.completions = newComp;
  saveData();
  renderItemList();
  showToast('Item deleted.');
}

/* =====================
   CAMPUS MODAL
   ===================== */
function openCampusModal() {
  renderCampusManageList();
  document.getElementById('campusModal').classList.add('open');
}

function closeCampusModal() {
  document.getElementById('campusModal').classList.remove('open');
  populateDropdowns();
  renderChecklist();
  renderCampusSummary();
}

function renderCampusManageList() {
  var list = document.getElementById('campusManageList');
  if (!appData.settings.campuses.length) {
    list.innerHTML = '<div class="empty-state" style="padding:16px">No campuses yet. Add one below.</div>';
    return;
  }
  var html = '';
  appData.settings.campuses.forEach(function(c) {
    html += '<div class="campus-manage-row">';
    html += '<span class="cname">' + escHtml(c) + '</span>';
    html += '<button class="btn-sm danger" onclick="deleteCampus(\'' + escHtml(c).replace(/'/g,"\\'") + '\')" title="Remove campus">&#10005;</button>';
    html += '</div>';
  });
  list.innerHTML = html;
}

function addCampus() {
  var name = document.getElementById('newCampusName').value.trim();
  if (!name) { showToast('Campus name is required.'); return; }
  if (appData.settings.campuses.indexOf(name) !== -1) { showToast('Campus already exists.'); return; }
  appData.settings.campuses.push(name);
  saveData();
  document.getElementById('newCampusName').value = '';
  renderCampusManageList();
  showToast('Campus added: ' + name);
}

function deleteCampus(name) {
  if (!confirm('Remove campus "' + name + '"? Completion data for this campus will be removed.')) return;
  appData.settings.campuses = appData.settings.campuses.filter(function(c) { return c !== name; });
  var newComp = {};
  var prefix = '_' + name + '_';
  Object.keys(appData.completions).forEach(function(k) {
    if (k.indexOf(prefix) === -1) newComp[k] = appData.completions[k];
  });
  appData.completions = newComp;
  saveData();
  renderCampusManageList();
  showToast('Campus removed.');
}

/* =====================
   GENERATE REPORT
   ===================== */
function generateReport() {
  var semester = getSelectedSemester();
  if (!appData.items.length) { showToast('No items to report on.'); return; }
  if (!appData.settings.campuses.length) { showToast('No campuses added.'); return; }

  var campuses = appData.settings.campuses;

  // Group items by category
  var cats = {};
  var catOrder = [];
  appData.items.forEach(function(item) {
    var cat = item.category || 'General';
    if (!cats[cat]) { cats[cat] = []; catOrder.push(cat); }
    cats[cat].push(item);
  });

  document.getElementById('reportTitle').textContent = 'Compliance Report \u2014 ' + semester;

  var tableHtml = '<thead><tr><th>Category</th><th>Item</th>';
  campuses.forEach(function(c) { tableHtml += '<th>' + escHtml(c) + '</th>'; });
  tableHtml += '</tr></thead><tbody>';

  catOrder.forEach(function(cat) {
    // Category header row
    tableHtml += '<tr><td colspan="' + (2 + campuses.length) + '" style="background:#e8edf5;font-weight:700;font-size:11px;color:#2c3e6e;text-transform:uppercase;padding:6px 10px">' + escHtml(cat) + '</td></tr>';
    cats[cat].forEach(function(item) {
      tableHtml += '<tr><td></td><td>' + escHtml(item.text) + (item.required ? '<span class="req-mark">*</span>' : '') + '</td>';
      campuses.forEach(function(c) {
        var comp = getCompletion(semester, c, item.id);
        if (comp.checked) {
          tableHtml += '<td style="text-align:center"><span class="check">&#10003;</span>';
          if (comp.completedBy) tableHtml += '<br/><span style="font-size:9px;color:#888">' + escHtml(comp.completedBy) + '</span>';
          tableHtml += '</td>';
        } else {
          tableHtml += '<td style="text-align:center"><span class="uncheck">&#9675;</span></td>';
        }
      });
      tableHtml += '</tr>';
    });
  });

  // Summary row
  tableHtml += '<tr style="background:#f0f2f7;font-weight:700"><td colspan="2" style="padding:8px 10px">COMPLETION %</td>';
  campuses.forEach(function(c) {
    var pct = getCompletionPct(semester, c);
    var color = pct >= 80 ? '#27ae60' : (pct >= 50 ? '#f39c12' : '#e74c3c');
    tableHtml += '<td style="text-align:center;color:' + color + ';font-size:16px">' + pct + '%</td>';
  });
  tableHtml += '</tr>';

  tableHtml += '</tbody>';
  document.getElementById('reportTable').innerHTML = tableHtml;
  document.getElementById('reportOverlay').classList.add('open');
}

function closeReport() {
  document.getElementById('reportOverlay').classList.remove('open');
}

/* =====================
   DARK MODE
   ===================== */
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  var isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('esl_app_theme', isDark ? 'dark' : 'light');
  document.getElementById('darkModeToggle').textContent = isDark ? '\u2600 Light' : '\u263d Dark';
}

function applyTheme() {
  var theme = localStorage.getItem('esl_app_theme');
  if (theme === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('darkModeToggle').textContent = '\u2600 Light';
  }
}

/* =====================
   INIT
   ===================== */
function init() {
  applyTheme();
  loadData();
  populateDropdowns();
  // Select first semester by default, leave campus blank
  renderChecklist();
  renderCampusSummary();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(function(){});
}
</script>
</body>
</html>
